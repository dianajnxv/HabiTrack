<div id="ai-widget">
    <button id="ai-open-btn">✨</button>
    <div id="ai-chat-window">
        <div class="chat-header">
            <span>Lumos Flow Assistant AI</span>
            <span id="ai-close-chat" style="cursor: pointer">×</span>
        </div>
        <div id="chat-content">
            <div class="msg-ai">Hi! I'm your Lumos Flow Assistant. How can I light up your routine today?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type a message..." />
            <button id="chat-send">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>
